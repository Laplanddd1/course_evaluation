{% extends 'base.html' %}

{% block title %}个人设置{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-lg">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0"><i class="fas fa-user-cog me-2"></i>修改密码</h4>
                </div>
                <div class="card-body p-4">
                    <form method="post">
                        {% csrf_token %}
                        
                        {% for field in form %}
                            <div class="mb-3">
                                <label for="{{ field.id_for_label }}" class="form-label fw-bold">{{ field.label }}</label>
                                {{ field }} 
                                {% if field.help_text %}
                                    <div class="form-text small">{{ field.help_text|safe }}</div>
                                {% endif %}
                                {% if field.errors %}
                                    <div class="text-danger small mt-1">
                                        {{ field.errors.0 }}
                                    </div>
                                {% endif %}
                            </div>
                        {% endfor %}

                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-primary btn-lg">保存更改</button>
                            <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary">返回仪表盘</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // 简单的脚本给 Django 默认表单字段添加 Bootstrap 类
    document.addEventListener('DOMContentLoaded', function() {
        var inputs = document.querySelectorAll('input[type="password"], input[type="text"]');
        inputs.forEach(function(input) {
            input.classList.add('form-control');
        });
    });
</script>
{% endblock %}
